<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Horadric AI - AI-powered Diablo IV gear analyzer. Instant analysis from leveling to endgame.">
    <meta name="theme-color" content="#0f172a">
    <meta name="color-scheme" content="dark">

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://vercel.live 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob: https://www.google-analytics.com https://www.googletagmanager.com;
        connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://generativelanguage.googleapis.com https://region1.google-analytics.com https://region1.analytics.google.com https://vercel.live;
        base-uri 'self';
        form-action 'self' https://forms.gle;
    ">

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">

    <title>Horadric AI - Diablo IV Loot Analyzer</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E1JZ16DMSF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E1JZ16DMSF');
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23dc2626'>⚔</text></svg>" type="image/svg+xml">

    <!-- Prevent FOUC -->
    <style>
      html { background: #0f172a; }
      body { margin: 0; opacity: 0; transition: opacity 0.15s ease-in; }
      body.loaded { opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Reveal body after React hydrates to prevent FOUC
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => document.body.classList.add('loaded'));
      } else {
        window.addEventListener('load', () => document.body.classList.add('loaded'));
      }
      // Fallback in case fonts take too long
      setTimeout(() => document.body.classList.add('loaded'), 300);
    </script>
</body>
</html>
